version: 2
# Sayfeai AEO seed queries — bootstrapped 2026-05-17, rebranded 2026-05-18 to sayfeai.com.
# Each entry lists a query we test daily against answer engines (ChatGPT, Claude,
# Google AI Overviews) to measure whether sayfeai.com is cited. target_page is the
# page we expect to win on; target_competitor (when set) is the dominant cited URL
# we are trying to displace.
#
# v2 changes (2026-05-18):
# - Canonical domain switched from elevaiq.com -> sayfeai.com
# - Added compliance pillar queries (Engine 1 alignment with /compliance-assessment)
# - Added partner channel queries (Engine 2 alignment)
# - Added local / Houston / Texas signal queries
# - Added bucket aggregation for daily reporting by category
# - During the 30-day transition window (through 2026-06-18), the optimizer ALSO
#   counted elevaiq.com citations toward sayfeai.com (until 301s fully propagated).
# 2026-06-27 maintenance:
# - colorado-ai-act-small-business: target_competitor updated leg.colorado.gov/bills/sb24-205
#   (REPEALED bill page — replaced by SB 26-189 on 2026-05-14) -> availablelaw.com, which has
#   owned the SMB-rewrite framing across 3 measured runs (6/23, 6/26, 6/27). Satisfies the
#   escalated-watch "persists a third measured run" rule.
# 2026-06-19 maintenance:
# - TRANSITION WINDOW CLOSED. elevaiq.com retired from transition_domains (legacy
#   counting ended 2026-06-18). Any elevaiq.com citation now counts as cited_us:false.
# - Added openai-partner-network-tiers (partner_channel) — OpenAI Partner Network is
#   now fully live & dominant ($150M, 300k certified consultants by EOY 2026,
#   Select/Advanced/Elite tiers); competitors publish "Official OpenAI SMB Channel Partner"
#   pages. Distinct citation surface from openai-partner-for-consultants.
# 2026-06-11 maintenance:
# - NO optimizer run occurred 2026-06-10 (gap day; content engine only). Flat-zero day count therefore has a 1-day measurement hole.
# - Added chatgpt-superapp-aria (content-engine handoff: Aria blog published 2026-06-10).
# 2026-05-19 maintenance:
# - openai-partner-for-consultants: auto-detected target_competitor as openai.com partner intake (in 3+ result sets across two runs)
# - colorado-ai-act-* notes: SB 24-205 effectively replaced by SB 189 signed by Gov Polis 2026-05-14, effective 2027-01-01
