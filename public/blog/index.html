    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Figtree', sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, #0f3460 0%, #2d8cf0 100%);
            color: white;
            padding: 60px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            font-weight: 700;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .blog-section {
            padding: 60px 20px;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .blog-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }

        .blog-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.2);
        }

        .blog-card-image {
            height: 200px;
            background: linear-gradient(135deg, #0f3460 0%, #2d8cf0 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3em;
            font-weight: bold;
        }

        .blog-card-content {
            padding: 25px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
        }

        .blog-card h2 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #0f3460;
            line-height: 1.4;
        }

        .blog-card p {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 15px;
            flex-grow: 1;
        }

        .blog-card .date {
            font-size: 0.85em;
            color: #999;
            margin-bottom: 15px;
        }

        .read-more {
            color: #2d8cf0;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }

        .read-more:hover {
            text-decoration: underline;
        }

        footer {
            background: #0f3460;
            color: white;
            text-align: center;
            padding: 20px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <header>

    <div class="container">

        function renderBlogCards() {
            const grid = document.querySelector('.blog-grid');
            grid.innerHTML = '';

            blogPosts.forEach(post => {
                const card = document.createElement('a');
                card.href = post.link;
                card.className = 'blog-card';

                card.innerHTML = `
                    <div class="blog-card-image">${post.emoji}</div>
                    <div class="blog-card-content">
                        <h2>${post.name}</h2>
                        <p>${post.description}</p>
                        <div class="date">${post.category} • ${post.date}</div>
                        <span class="read-more">Read Article →</span>
                    </div>
                `;

                grid.appendChild(card);
            });
        }

        function filterCards() {
            renderBlogCards();
        }

        document.addEventListener('DOMContentLoaded', renderBlogCards);
        filterCards();
    </script>
